{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="mb-3">Manager Login</h2>
                <p class="text-muted">Only the branch manager can add customers, open accounts, deposit, withdraw, or transfer funds.</p>

                <form method="POST">
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="mb-3">
                        <label class="form-label">Manager Username</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Manager Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>

                <div class="alert alert-light border mt-3 mb-0">
                    <strong>Security note:</strong> Logout after completing management tasks.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
