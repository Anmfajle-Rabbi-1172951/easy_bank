{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body p-4">
          <h5 class="mb-2">Forgot password</h5>
          <p class="text-muted small mb-3">Enter your RO ID to send a reset request to the manager.</p>
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endwith %}
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">RO ID</label>
              <input type="text" name="ro_id" class="form-control" placeholder="e.g. RO-001" required>
            </div>
            <button type="submit" class="btn btn-warning w-100">Send reset request</button>
          </form>
          <div class="text-center mt-3">
            <a href="{{ url_for('ro_login_page') }}" class="small">Back to login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
