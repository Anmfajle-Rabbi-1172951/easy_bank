{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-body p-4">
          <div class="alert alert-warning">
            <strong>Action required:</strong> You must create a new password before continuing.
          </div>
          <h5 class="mb-3">Create your new password</h5>
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endwith %}
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">New password</label>
              <input type="password" name="new_password" class="form-control" placeholder="Minimum 8 characters" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm new password</label>
              <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Set password & continue</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
