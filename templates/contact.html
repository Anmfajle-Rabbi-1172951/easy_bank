{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body p-4">
                <h3 class="mb-2">Contact Us</h3>
                <p class="text-muted mb-4">Easy Bank New Zealand, Lincoln Branch. Please send your enquiry using the form below.</p>

                <div class="alert alert-info">
                    If you need instant support, please call or WhatsApp {{ contact_phone_whatsapp }}.
                </div>

                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Your Enquiry</label>
                            <select name="enquiry" class="form-select" required>
                                <option value="">Select enquiry type</option>
                                <option>Open Savings Account</option>
                                <option>Deposit or Withdrawal</option>
                                <option>Customer Profile</option>
                                <option>General Enquiry</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Comment</label>
                            <textarea name="comment" rows="5" class="form-control" placeholder="Write your message here..."></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-primary px-4">Submit Enquiry</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
