{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">Management Account Report PDF</h2>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Report Type</label>
                <select name="report_type" class="form-select" required>
                    <option value="today">Accounts Opened Today</option>
                    <option value="all">All Savings Accounts</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Download Management PDF</button>
            <a href="{{ url_for('reports_page') }}" class="btn btn-outline-secondary">Back to Reports</a>
        </form>
    </div>
</div>
{% endblock %}
