{% extends "base.html" %}
{% block content %}
<div class="report-page-heading mb-3">
    <img src="{{ url_for('static', filename='images/easy_bank_logo.png') }}" alt="Easy Bank logo" class="report-logo">
    <div>
        <p class="small-label mb-1">{{ tagline }}</p>
        <h2 class="mb-0">Management Account Report PDF</h2>
    </div>
</div>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Report Type</label>
                <select name="report_type" class="form-select" required>
                    <option value="today">Accounts Opened Today</option>
                    <option value="all">All Savings Accounts</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Download Management PDF</button>
            <a href="{{ url_for('reports_page') }}" class="btn btn-outline-secondary">Back to Reports</a>
        </form>
    </div>
</div>
{% endblock %}
